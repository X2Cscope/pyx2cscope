name: Build PyInstaller Executable

on:
  release:
    types: [published]

jobs:
    buildwindows:
        runs-on: windows-latest

        steps:
        - name: Checkout repository
          uses: actions/checkout@v4
          with:
            submodules: 'recursive'

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.12'

        - name: Install dependencies
          run: |
                python -m pip install --upgrade pip
                pip install -e ".[build]"

        - name: Build executable
          run: |
                pyinstaller --noconfirm .\pyx2cscope_win.spec

        - name: Create startWebInterface.bat
          shell: cmd
          run: |
                echo pyX2Cscope.exe -w > dist\pyx2cscope\startWebInterface.bat

        - name: Zip artifact
          run: |
                Compress-Archive -Path dist/pyX2Cscope -DestinationPath pyX2Cscope_win_amd64_${{ github.event.release.tag_name }}.zip

        - name: Upload to release
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          run: |
                gh release upload ${{ github.event.release.tag_name }} pyX2Cscope_win_amd64_${{ github.event.release.tag_name }}.zip


    buildlinux:
        runs-on: ubuntu-latest

        steps:
        - name: Checkout repository
          uses: actions/checkout@v4
          with:
            submodules: 'recursive'

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
                python-version: '3.12'

        - name: Install dependencies
          run: |
                python -m pip install --upgrade pip
                pip install -e ".[build]"
                sudo apt install libxcb-xinerama0

        - name: Build executable
          run: |
                pyinstaller --noconfirm ./pyx2cscope_linux.spec

        - name: Create startWebInterface.sh
          run: |
                echo '#!/bin/bash' > dist/pyX2Cscope_linux/startWebInterface.sh
                echo './pyX2Cscope_linux -w' >> dist/pyX2Cscope_linux/startWebInterface.sh
                chmod +x dist/pyX2Cscope_linux/startWebInterface.sh

        - name: Zip artifact
          run: |
                zip -r pyX2Cscope_linux_amd64_${{ github.event.release.tag_name }}.zip dist/pyX2Cscope_linux

        - name: Upload to release
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          run: |
                gh release upload ${{ github.event.release.tag_name }} pyX2Cscope_linux_amd64_${{ github.event.release.tag_name }}.zip


    attach-pypi-wheel:
        runs-on: ubuntu-latest
        needs: [buildwindows, buildlinux]

        steps:
        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.12'

        - name: Download wheel from PyPI
          run: |
            VERSION=${{ github.event.release.tag_name }}
            # Strip leading 'v' if present (PyPI uses plain version numbers)
            PYPI_VERSION=${VERSION#v}
            # Retry up to 5 times to allow PyPI propagation after release.yml upload
            for i in $(seq 1 5); do
              pip download "pyx2cscope==${PYPI_VERSION}" --no-deps --dest ./dist && break
              echo "Attempt $i failed, retrying in 30s..."
              sleep 30
            done
            ls ./dist/

        - name: Upload wheel to release
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          run: |
            gh release upload ${{ github.event.release.tag_name }} ./dist/*.whl --repo ${{ github.repository }}
