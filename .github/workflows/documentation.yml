  tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install system dependencies for Qt
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libxkbcommon-x11-0 \
          libxcb-icccm4 \
          libxcb-image0 \
          libxcb-keysyms1 \
          libxcb-randr0 \
          libxcb-render-util0 \
          libxcb-xinerama0 \
          libxcb-xfixes0 \
          libegl1 \
          libgl1 \
          xvfb

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run tests
      env:
        QT_QPA_PLATFORM: offscreen
        DISPLAY: ":99.0"
      run: |
        Xvfb :99 -screen 0 1024x768x24 &
        sleep 2
        pytest -v

  tests-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13", "3.14"]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies for Qt
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libxkbcommon-x11-0 \
          libxcb-icccm4 \
          libxcb-image0 \
          libxcb-keysyms1 \
          libxcb-randr0 \
          libxcb-render-util0 \
          libxcb-xinerama0 \
          libxcb-xfixes0 \
          libegl1 \
          libgl1 \
          xvfb

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run tests
      env:
        QT_QPA_PLATFORM: offscreen
        DISPLAY: ":99.0"
      run: |
        Xvfb :99 -screen 0 1024x768x24 &
        sleep 2
        pytest -v

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"

      - name: Build documentation
        run: |
          sphinx-build -M html doc build --keep-going

  docs-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13", "3.14"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"

      - name: Build documentation
        run: |
          sphinx-build -M html doc build --keep-going

  version-check:
    runs-on: ubuntu-latest
    if: github.base_ref == 'main'
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Check version consistency
      run: |
        # Get version from pyproject.toml
        PYPROJECT_VERSION=$(grep -oP 'version\s*=\s*"\K[^"]+' pyproject.toml)
        # Get version from __init__.py
        INIT_VERSION=$(grep -oP '__version__\s*=\s*["\x27]\K[^"\x27]+' pyx2cscope/__init__.py)
        
        if [ "$PYPROJECT_VERSION" != "$INIT_VERSION" ]; then
          echo "❌ Version mismatch between pyproject.toml ($PYPROJECT_VERSION) and __init__.py ($INIT_VERSION)"
          echo "Run 'python scripts/update_version.py' to synchronize versions"
          exit 1
        fi
        echo "✅ Version consistency verified: $PYPROJECT_VERSION"

    - name: Check version has been updated
      if: github.base_ref == 'main'
      run: |
        # Get PR version
        PR_VERSION=$(grep -oP 'version\s*=\s*"\K[^"]+' pyproject.toml)
        
        # Get main branch version
        git fetch origin main:main
        MAIN_VERSION=$(git show main:pyproject.toml | grep -oP 'version\s*=\s*"\K[^"]+')
        
        if [ "$PR_VERSION" == "$MAIN_VERSION" ]; then
          echo "❌ ERROR: Version in PR ($PR_VERSION) is the same as in main branch ($MAIN_VERSION)"
          echo "Please update the version in pyproject.toml"
          exit 1
        fi
        echo "✅ Version check passed: $PR_VERSION (PR) vs $MAIN_VERSION (main)"
