<div class="d-flex flex-column h-100" style="position: relative; min-height: 600px;">
    <input type="file" id="dashboardFileInput" style="display: none;" accept=".json">

    <!-- Widget Palette (Edit Mode Only) -->
    <div class="row flex-grow-1" id="dashboardContainer">
        <div class="col-12 col-md-3 col-lg-2" id="widgetPalette" style="display: none;">
            <div class="card h-100">
                <div class="card-header py-2">
                    <strong>Widgets</strong>
                </div>
                <div class="card-body p-2">
                    <div class="d-grid gap-2" id="widgetPaletteButtons">
                        <!-- Dynamically populated from registered widget types -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Canvas -->
        <div class="col-12" id="dashboardCanvasCol">
            <div id="dashboardCanvas" style="position: relative; background: #f8f9fa; border-radius: 8px;">
                <!-- Widgets will be rendered here -->
            </div>
        </div>
    </div>
</div>

<!-- Widget Configuration Modal -->
<div class="modal fade" id="widgetConfigModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Configure Widget</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3" id="widgetVarNameContainer">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <label class="form-label mb-0">Variable Name</label>
                        <div class="form-check form-switch mb-0">
                            <input class="form-check-input" type="checkbox" id="widgetSfrToggle" role="switch">
                            <label class="form-check-label" for="widgetSfrToggle">SFR</label>
                        </div>
                    </div>
                    <select class="form-control" id="widgetVarName" style="width: 100%;"></select>
                </div>
                <div id="widgetExtraConfig"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="addDashboardWidget()">Add Widget</button>
            </div>
        </div>
    </div>
</div>
