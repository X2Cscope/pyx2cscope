<div class="d-flex flex-column h-100" style="position: relative; min-height: 600px;">
    <input type="file" id="dashboardFileInput" style="display: none;" accept=".json">

    <!-- Widget Palette (Edit Mode Only) -->
    <div class="row flex-grow-1" id="dashboardContainer">
        <div class="col-12 col-md-3 col-lg-2" id="widgetPalette" style="display: none;">
            <div class="card h-100">
                <div class="card-header py-2">
                    <strong>Widgets</strong>
                </div>
                <div class="card-body p-2">
                    <div class="d-grid gap-2">
                        <button class="btn btn-sm btn-outline-primary text-start" onclick="showWidgetConfig('slider')">
                            <span class="material-icons md-18">tune</span> Slider
                        </button>
                        <button class="btn btn-sm btn-outline-primary text-start" onclick="showWidgetConfig('button')">
                            <span class="material-icons md-18">radio_button_checked</span> Button
                        </button>
                        <button class="btn btn-sm btn-outline-primary text-start" onclick="showWidgetConfig('number')">
                            <span class="material-icons md-18">pin</span> Number
                        </button>
                        <button class="btn btn-sm btn-outline-primary text-start" onclick="showWidgetConfig('text')">
                            <span class="material-icons md-18">text_fields</span> Text
                        </button>
                        <button class="btn btn-sm btn-outline-primary text-start" onclick="showWidgetConfig('label')">
                            <span class="material-icons md-18">label</span> Label
                        </button>
                        <button class="btn btn-sm btn-outline-primary text-start" onclick="showWidgetConfig('gauge')">
                            <span class="material-icons md-18">speed</span> Gauge
                        </button>
                        <button class="btn btn-sm btn-outline-primary text-start" onclick="showWidgetConfig('plot_logger')">
                            <span class="material-icons md-18">timeline</span> Logger
                        </button>
                        <button class="btn btn-sm btn-outline-primary text-start" onclick="showWidgetConfig('plot_scope')">
                            <span class="material-icons md-18">show_chart</span> Scope
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Canvas -->
        <div class="col-12" id="dashboardCanvasCol">
            <div id="dashboardCanvas" style="position: relative; min-height: 500px; background: #f8f9fa; border-radius: 8px;">
                <!-- Widgets will be rendered here -->
            </div>
        </div>
    </div>
</div>

<!-- Widget Configuration Modal -->
<div class="modal fade" id="widgetConfigModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Configure Widget</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">Variable Name</label>
                    <input type="text" class="form-control" id="widgetVarName" placeholder="e.g., temperature">
                </div>
                <div id="widgetExtraConfig"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="addDashboardWidget()">Add Widget</button>
            </div>
        </div>
    </div>
</div>

{% block scripts %}
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
{% endblock scripts %}
